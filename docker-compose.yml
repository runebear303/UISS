services:
  mysql:
    image: mysql:8
    container_name: uiss_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uiss_db
      MYSQL_USER: uiss_user
      MYSQL_PASSWORD: uiss_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ollama:
    image: ollama/ollama
    container_name: uiss_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Dwingt Ollama om tinyllama te downloaden bij start:
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull tinyllama && tail -f /dev/null"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: uiss_backend
    depends_on:
      - mysql
      - ollama
    ports:
      - "8000:8000"
    environment:
      ENV: docker
      DB_HOST: uiss_mysql # Match met container_name van mysql
      DB_PORT: 3306
      DB_USER: uiss_user
      DB_PASS: uiss_password
      DB_NAME: uiss_db
      OLLAMA_URL: http://uiss_ollama:11434/api/generate # Match met container_name van ollama
      SECRET_KEY: super_secure_key
    volumes:
      - ./backend:/app
      - /app/venv
      - ./backend/app/data:/app/app/data
      - ./backend/app/source/docs:/app/app/source/docs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: uiss_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  ollama_data:
